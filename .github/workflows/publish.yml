# This workflow runs tests with Bun and then publishes the package to npm when a release is created
# For more information see: https://docs.npmjs.com/generating-provenance-statements

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7
      - run: bun install --frozen-lockfile
      - run: bun run tests

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for provenance and trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      - run: bun install --frozen-lockfile
      - run: bun run build
      # npm >= 11.5.1 is needed for trusted publishing (OIDC); it also works with a token
      - run: npm install -g npm@latest
      - run: npm publish --access public
