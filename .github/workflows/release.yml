# Release pipeline driven by changesets.
#
# On every push to main this either:
#   * opens / updates a "Version Packages" PR that consumes the pending
#     changesets, bumps the version and updates CHANGELOG.md; or
#   * if that PR was just merged (no changesets left), builds and publishes
#     to npm using trusted publishing (OIDC) with provenance.

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # create the version PR / tags
  pull-requests: write # open the version PR
  id-token: write # trusted publishing (OIDC) + provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      - run: bun install --frozen-lockfile
      # npm >= 11.5.1 is required for trusted publishing (OIDC).
      - run: npm install -g npm@latest
      - uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
