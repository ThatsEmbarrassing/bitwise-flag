# Lints, type-checks, tests and validates the package on every push / PR to main.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run tests
      - run: bun run build
      # Validate the published package shape against the built dist/.
      - run: bun run publint
      # Informational: dts code-splitting (bunup `dts.splitting`) emits extensionless
      # chunk imports that don't resolve under node16/nodenext moduleResolution.
      # Kept non-blocking on purpose until/if the dts strategy changes.
      - run: bun run attw
        continue-on-error: true
