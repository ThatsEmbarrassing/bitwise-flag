# This workflow installs dependencies, builds the source code and runs tests/lint with Bun
# For more information see: https://bun.sh/guides/runtime/cicd

name: Bun.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        bun-version: [1.3.1]

    steps:
      - uses: actions/checkout@v4
      - name: Use Bun.js ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - run: bun install --frozen-lockfile
      - run: bun run tests
      - run: bun run lint
      - run: bun run build
