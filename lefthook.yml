# Git hooks managed by lefthook. Installed automatically via the `prepare` script.
# https://lefthook.dev/configuration/

commit-msg:
  jobs:
    - name: commitlint
      run: bunx commitlint --edit {1}

pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "*.{ts,mjs}"
      run: bun run lint
